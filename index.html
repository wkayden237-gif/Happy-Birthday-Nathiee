<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌷 Happy Birthday Nathieee 💖</title>
    <style>
        /* ===== GLOBAL STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #0a0a1f 0%, #000 70%);
            position: relative;
            color: #fff;
        }

        /* ===== PASSWORD SCREEN ===== */
        #passwordScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a0a1f 0%, #000 90%);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: all 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        #passwordScreen.unlock {
            opacity: 0;
            transform: scale(0.9);
        }

        .password-container {
            background: rgba(255, 105, 180, 0.15);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 
                0 30px 80px rgba(255,105,180,0.4),
                inset 0 1px 0 rgba(255,255,255,0.2);
            border: 1px solid rgba(255,182,193,0.4);
            max-width: 450px;
            width: 90%;
            transform: scale(1);
            transition: all 0.6s ease;
        }

        .password-lock {
            font-size: 6rem;
            background: linear-gradient(45deg, #ff69b4, #ffd700, #ff1493);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            animation: lockPulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 40px rgba(255,105,180,0.8));
        }

        @keyframes lockPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.15) rotate(5deg); }
        }

        .password-title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 7vw, 4rem);
            background: linear-gradient(45deg, #ffb6c1, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .password-hint {
            color: rgba(255,255,255,0.8);
            font-size: 1.3rem;
            margin-bottom: 40px;
            font-weight: 300;
        }

        #passwordInput {
            width: 100%;
            padding: 25px 35px;
            font-size: 1.8rem;
            font-weight: 700;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,215,0,0.5);
            border-radius: 60px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(25px);
            transition: all 0.4s ease;
            letter-spacing: 4px;
            font-family: inherit;
        }

        #passwordInput:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 
                0 0 40px rgba(255,215,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        #passwordInput.wrong {
            animation: shake 0.6s cubic-bezier(0.36,0.07,0.19,0.97);
            border-color: #ff4444;
            box-shadow: 0 0 30px rgba(255,68,68,0.6);
        }

        .unlock-btn {
            margin-top: 40px;
            padding: 22px 70px;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ff69b4, #ff1493, #c71585);
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 20px 50px rgba(255,105,180,0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: inherit;
        }

        .unlock-btn:hover {
            transform: translateY(-5px) scale(1.08);
            box-shadow: 0 30px 60px rgba(255,105,180,0.7);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            15% { transform: translateX(-12px) rotate(-3deg); }
            30% { transform: translateX(12px) rotate(3deg); }
            45% { transform: translateX(-6px) rotate(-1.5deg); }
            60% { transform: translateX(6px) rotate(1.5deg); }
            75% { transform: translateX(-3px) rotate(-1deg); }
        }

        /* ===== HIDE ALL CONTENT UNTIL UNLOCKED ===== */
        .main-content {
            display: none;
        }

        .main-content.unlocked {
            display: block;
        }

        /* ===== NIGHT SKY & STARS ===== */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        /* ===== FLOATING PETALS ===== */
        .petals {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .petal {
            position: absolute;
            font-size: 25px;
            opacity: 0.7;
            animation: petalFloat 15s linear infinite;
        }

        @keyframes petalFloat {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% {
                transform: translateY(-50px) rotate(720deg) scale(1);
                opacity: 0;
            }
        }

        /* ===== PAGE SECTIONS ===== */
        .section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: scale(0.9) translateY(50px);
            transition: all 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 10;
        }

        .section.active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* ===== WELCOME SCREEN ===== */
        .welcome {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 60px 40px;
            max-width: 600px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,182,193,0.3);
        }

        .welcome h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3.5rem, 10vw, 7rem);
            background: linear-gradient(45deg, #ff69b4, #ffb6c1, #ffc0cb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: glowPulse 2s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(255,105,180,0.8);
        }

        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 40px rgba(255,105,180,0.8)); }
            50% { filter: drop-shadow(0 0 60px rgba(255,182,193,1)); }
        }

        /* ===== ENVELOPE ANIMATION ===== */
        .envelope-container {
            perspective: 1000px;
            cursor: pointer;
        }

        .envelope {
            width: 250px;
            height: 160px;
            position: relative;
            transform-style: preserve-3d;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
